function buildTopicDeck() {
  const all = [];
  Object.entries(TOPIC_BANK).forEach(([cat, list]) => {
    list.forEach((t) => all.push({ category: cat, text: t }));
  });
  let seed = 19840613;
  function rand() {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, 366);
}
const TOPIC_DECK = buildTopicDeck();

function dayOfYear(d) {
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  return Math.floor(diff / 86400000);
}

/* ---------------------------------------------------------
   localStorage-backed persistence (standalone, no Claude runtime)
--------------------------------------------------------- */
function readLS(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw !== null ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function writeLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error("save failed", e); }
}
function listLS(prefix) {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf(prefix) === 0) keys.push(k);
  }
  return keys;
}
function useStorage(key, initial) {
  const [value, setValue] = useState(() => readLS(key, initial));
  const save = useCallback((next) => { setValue(next); writeLS(key, next); }, [key]);
  return [value, save, true];
}

function SobrietyTab({ theme }) {
  const [data, save, loaded] = useStorage("sobriety:tracker", [
    { name: "Alcohol", since: "" }, { name: "Substance 2", since: "" }, { name: "Substance 3", since: "" },
  ]);
  const updateField = (i, field, value) => save(data.map((d, idx) => idx === i ? { ...d, [field]: value } : d));

  function durationSince(dateStr) {
    if (!dateStr) return null;
    const start = new Date(dateStr + "T00:00:00");
    if (isNaN(start)) return null;
    const now = new Date();
    let ms = now - start;
    if (ms < 0) return { invalid: true };
    const totalDays = Math.floor(ms / 86400000);
    let years = now.getFullYear() - start.getFullYear();
    let months = now.getMonth() - start.getMonth();
    let days = now.getDate() - start.getDate();
    if (days < 0) { months -= 1; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
    if (months < 0) { years -= 1; months += 12; }
    return { years, months, days, totalDays };
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <span style={{ fontSize: 22 }}>🔥</span>
        <h2 style={{ fontFamily: theme.display, fontSize: 22, margin: 0, color: theme.text }}>Sobriety Tracker</h2>
      </div>
      <p style={{ color: theme.textMuted, fontSize: 14, marginTop: 4, marginBottom: 18 }}>
        Track up to three substances with the exact date — including year — you got clean.
      </p>
      {data.map((d, i) => {
        const dur = durationSince(d.since);
        return (
          <Card key={i} theme={theme} style={{ marginBottom: 14 }}>
            <input value={d.name} onChange={(e) => updateField(i, "name", e.target.value)} placeholder="Substance name"
              style={{ width: "100%", background: "transparent", border: "none", borderBottom: `2px solid ${theme.border}`, color: theme.text, fontFamily: theme.display, fontWeight: 800, fontSize: 17, padding: "4px 0", marginBottom: 14, outline: "none" }} />
            <label style={{ fontSize: 12, color: theme.textMuted, fontWeight: 700 }}>Clean since (month / day / year)</label>
            <input type="date" value={d.since} max={dateKey(new Date())} onChange={(e) => updateField(i, "since", e.target.value)}
              style={{ width: "100%", marginTop: 4, background: theme.bgSoft, color: theme.text, border: `1px solid ${theme.border}`, borderRadius: 10, padding: 10, fontSize: 14 }} />
            {dur && !dur.invalid && (
              <div style={{ marginTop: 14, display: "flex", gap: 10, flexWrap: "wrap" }}>
                {[["Years", dur.years], ["Months", dur.months], ["Days", dur.days]].map(([label, val]) => (
                  <div key={label} style={{ background: theme.cardAlt, borderRadius: 12, padding: "10px 16px", textAlign: "center", flex: "1 1 80px" }}>
                    <div style={{ fontFamily: theme.display, fontSize: 24, fontWeight: 900, color: theme.primary }}>{val}</div>
                    <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 700, textTransform: "uppercase" }}>{label}</div>
                  </div>
                ))}
                <div style={{ background: theme.cardAlt, borderRadius: 12, padding: "10px 16px", textAlign: "center", flex: "1 1 100px" }}>
                  <div style={{ fontFamily: theme.display, fontSize: 24, fontWeight: 900, color: theme.secondary }}>{dur.totalDays}</div>
                  <div style={{ fontSize: 11, color: theme.textMuted, fontWeight: 700, textTransform: "uppercase" }}>Total Days</div>
                </div>
              </div>
            )}
            {dur && dur.invalid && <div style={{ marginTop: 10, color: theme.accent, fontSize: 12, fontWeight: 700 }}>That date is in the future — double check it.</div>}
          </Card>
        );
      })}
    </div>
  );
}

            <button key={t.key} onClick={() => setTab(t.key)} style={{ background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "6px 10px", cursor: "pointer", color: active ? theme.primary : theme.textMuted }}>
              <span style={{ fontSize: 18 }}>{t.icon}</span>
              <span style={{ fontSize: 10, fontWeight: 700 }}>{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
